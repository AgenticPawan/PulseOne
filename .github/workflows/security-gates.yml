name: security-gates

# Security gates run on every PR and push to main. The gitleaks job is a HARD GATE:
# a leaked secret fails the build (CLAUDE.md security rule #1).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # No GITLEAKS_LICENSE needed for public repos. Detection failure = build failure.
          GITLEAKS_CONFIG: .gitleaks.toml

  dependency-audit:
    name: NuGet vulnerability audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore with audit
        working-directory: src/backend
        run: dotnet restore PulseOne.sln /p:NuGetAudit=true

  codeql:
    name: CodeQL (csharp)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: csharp
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Build for analysis
        working-directory: src/backend
        run: dotnet build PulseOne.sln --configuration Release
      - uses: github/codeql-action/analyze@v3
