name: api-producer-deploy

# Deploys the stateless producer API (PulseOne.WebApi) to Azure Container Apps.
# CRITICAL ORDERING (blueprint §5): run the MigrationRunner ACA Job and wait for it to
# succeed BEFORE shifting traffic to a new revision. Migrations never run at app startup.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/backend/**'
      - '.github/workflows/api-producer-deploy.yml'

permissions:
  id-token: write   # OIDC federated credential — no client secrets
  contents: read

env:
  REGISTRY: <KEY_VAULT_REFERENCE: acr-login-server>
  RESOURCE_GROUP: rg-pulseone-prod
  MIGRATION_JOB: pulseone-migrationrunner-job
  API_APP: pulseone-webapi

jobs:
  build:
    name: Build & push API image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Build solution
        working-directory: src/backend
        run: dotnet build PulseOne.sln --configuration Release
      # TODO(Phase 8): docker build/push of PulseOne.WebApi to ACR via azure/login (OIDC).

  migrate:
    name: Run migrations (one-shot ACA Job)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Start MigrationRunner job and wait
        # az containerapp job start --name $MIGRATION_JOB ... then poll execution status.
        # Fail the deploy if the job execution status is not "Succeeded".
        run: echo "TODO(Phase 8): trigger '$MIGRATION_JOB' and block until completion."

  deploy:
    name: Shift traffic to new API revision
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - name: Deploy new revision
        run: echo "TODO(Phase 8): az containerapp update --name $API_APP after migrations succeed."
